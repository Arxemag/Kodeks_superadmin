# Kodeks superadmin: Auth API + единый Kafka worker (одна группа, все топики).
# БД — отдельно (свой контейнер или хост). В .env укажите хост БД: из контейнера
# это имя контейнера с PostgreSQL или host.docker.internal, если БД на хосте.
# При деплое подставьте KAFKA_BOOTSTRAP_SERVERS и DB_URL (или PG_*).

services:
  chromium:
    image: browserless/chrome:latest
    environment:
      - PORT=3000
      - CONNECTION_TIMEOUT=120000
      - MAX_CONCURRENT_SESSIONS=5
      - PREBOOT_CHROME=true
    ports:
      - "${CHROMIUM_PORT:-3000}:3000"
    restart: unless-stopped

  auth-api:
    build: .
    command: ["python", "main.py"]
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CHROMIUM_WS_ENDPOINT=${CHROMIUM_WS_ENDPOINT:-ws://chromium:3000}
    depends_on:
      - chromium
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "main_unified_worker.py"]
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CHROMIUM_WS_ENDPOINT=${CHROMIUM_WS_ENDPOINT:-ws://chromium:3000}
    depends_on:
      - chromium
    restart: unless-stopped
