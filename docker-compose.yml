# Kodeks superadmin: Auth API + единый Kafka worker (одна группа, все топики).
# БД — отдельно (свой контейнер или хост). В .env укажите хост БД: из контейнера
# это имя контейнера с PostgreSQL или host.docker.internal, если БД на хосте.
# При деплое подставьте KAFKA_BOOTSTRAP_SERVERS и DB_URL (или PG_*).

services:
  auth-api:
    build: .
    command: ["python", "main.py"]
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "main_unified_worker.py"]
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
