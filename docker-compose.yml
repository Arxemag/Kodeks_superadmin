# Kodeks superadmin: Auth API + единый Kafka worker (одна группа, все топики).
# При деплое подставьте KAFKA_BOOTSTRAP_SERVERS и DB_URL (или PG_*).
# В .env задайте KAFKA_GROUP_ID — одна группа для всех топиков.

services:
  auth-api:
    build: .
    command: ["python", "main.py"]
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "main_unified_worker.py"]
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
